# Provider-agnostic GPU miner — SkyPilot managed job (auto-recovering spot).
#
# The miner image runs on ANY CUDA GPU across ANY cloud SkyPilot supports (~25:
# AWS, GCP, Azure, Lambda, RunPod, Vast.ai, ...). Launched as a MANAGED job, SkyPilot
# picks the cheapest AVAILABLE matching GPU and AUTO-RECOVERS spot preemptions /
# hardware failures by re-provisioning elsewhere and restarting — the cattle-not-pets
# resilience layer, provider-agnostic by construction.
#
#   pip install "skypilot[aws,gcp,lambda,runpod,vast]"   # enable the providers you use
#   sky check                                             # verify credentials
#   sky jobs launch -n lattice-miner --use-spot fleet/miner.sky.yaml
#   sky jobs queue                   # status
#   sky jobs logs -n lattice-miner   # live mining logs
#   sky jobs cancel -n lattice-miner # stop
#
# The image is self-contained + STATELESS — its node re-syncs from built-in seeds on
# boot — so recovery is just re-provision + restart; no checkpointing needed.
#
# NOTE ON MARKETPLACES: SkyPilot's docker-image-as-task support is first-class on
# AWS/GCP/Azure/Lambda but newer/limited on Vast.ai and RunPod (SkyPilot's own docs
# note docker-container tasks are not fully supported on RunPod). If a marketplace
# rejects this, either (a) let SkyPilot use a first-class cloud, or (b) run the image
# directly on that provider (see fleet/README.md "Run it anywhere"), or (c) on Vast.ai
# specifically, use the optional watchdog in fleet/examples/.

name: lattice-miner

resources:
  # The miner runs on any CUDA GPU — list a set and SkyPilot uses the cheapest
  # AVAILABLE across your enabled clouds. Trim/extend for your budget (the SHA-256
  # PoW worker needs almost no VRAM, so cheap cards are fine).
  # CAVEATS: (1) SkyPilot has NO price ceiling here — it picks the cheapest *available*
  # card in this set, so if the cheap ones (T4/L4/RTX3060) are unavailable it will
  # provision a 4090/A10 spot instance at several × the cost. Trim the pricey cards for
  # a hard budget. (2) names must match SkyPilot's catalog (`sky show-gpus`) for an
  # ENABLED cloud or they're silently skipped — e.g. AWS lists the A10 as `A10G`, and
  # the consumer RTX cards are catalogued mainly on RunPod/Vast (the same marketplaces
  # where docker-as-task is limited; see the note below).
  accelerators: {RTX3060:1, RTX3070:1, RTX3080:1, RTX3090:1, RTX4090:1, L4:1, T4:1, A10:1, A10G:1}
  use_spot: true
  disk_size: 40
  image_id: docker:ghcr.io/adalinxx/lattice-miner-gpu:main
  # Spot preemptions recover UNBOUNDED (re-provision + restart). max_restarts_on_errors
  # caps recovery from NON-ZERO-EXIT crashes only: after 3 crash-restarts the managed job
  # goes FAILED and stops mining — it will NOT self-heal, and nothing here alerts on that
  # (wire a heartbeat or watch `sky jobs queue`). Raise the cap if you'd rather it keep
  # trying through a crash-loop.
  job_recovery:
    max_restarts_on_errors: 3

# image_id: docker overrides the image ENTRYPOINT with /bin/bash, so invoke the
# miner's entrypoint explicitly. It runs forever (node sync -> coordinator -> CUDA
# worker); on preemption SkyPilot re-provisions and reruns this.
run: /usr/local/bin/gpu-entrypoint
